<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZCT VWAP 信号看板</title>
  <style>
    :root {
      --bg: #0e1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
    }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.25rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .toolbar label { font-size: 0.8rem; color: var(--muted); }
    select, input[type="text"] {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.65rem;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    button {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button:hover { filter: brightness(1.08); }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }
    .card .k { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .card .v { font-size: 1.35rem; font-weight: 700; margin-top: 0.25rem; }
    .card .v.pos { color: var(--green); }
    .card .v.neg { color: var(--red); }
    .err {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid var(--red);
      color: #ffb4af;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: none;
    }
    .err.show { display: block; }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }
    th, td {
      padding: 0.55rem 0.65rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    th {
      background: rgba(22, 27, 34, 0.95);
      color: var(--muted);
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr:hover td { background: rgba(88, 166, 255, 0.06); }
    .mono { font-variant-numeric: tabular-nums; font-family: ui-monospace, monospace; }
    .tag {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .tag.long { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .tag.short { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .tag.flat { background: rgba(139, 148, 158, 0.15); color: var(--muted); }
    .status-open { color: var(--yellow); font-weight: 600; }
    .pnl-pos { color: var(--green); }
    .pnl-neg { color: var(--red); }
    .reason { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
    footer { margin-top: 1.5rem; font-size: 0.75rem; color: var(--muted); }
    @media (max-width: 720px) {
      .cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ZCT VWAP 虚拟信号看板</h1>
    <p class="sub">数据来源：<span class="mono">accumulation.db · zct_vwap_signals</span> · 与本机 API 同源刷新</p>

    <div id="err" class="err"></div>

    <div class="toolbar">
      <div>
        <label>状态</label><br />
        <select id="fStatus">
          <option value="all">全部</option>
          <option value="open">持仓中</option>
          <option value="settled">已结算</option>
        </select>
      </div>
      <div>
        <label>标的（可选）</label><br />
        <input type="text" id="fSymbol" placeholder="如 BTCUSDT" style="width:140px" />
      </div>
      <div style="align-self:flex-end">
        <button type="button" id="btnRefresh">刷新</button>
      </div>
    </div>

    <div class="cards" id="cards">
      <div class="card"><div class="k">持仓中</div><div class="v" id="cOpen">—</div></div>
      <div class="card"><div class="k">已结算</div><div class="v" id="cSettled">—</div></div>
      <div class="card"><div class="k">累计盈亏 (USDT)</div><div class="v mono" id="cPnl">—</div></div>
      <div class="card"><div class="k">胜率 (盈/(盈+亏))</div><div class="v" id="cWr">—</div></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>时间 UTC</th>
            <th>标的</th>
            <th>策略</th>
            <th>方向</th>
            <th>入场</th>
            <th>SL</th>
            <th>TP</th>
            <th>名义U</th>
            <th>状态</th>
            <th>平仓价</th>
            <th>R</th>
            <th>盈亏U</th>
            <th>摘要</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <footer>
      若数据为空，请先运行 <span class="mono">zct_vwap_signal_scanner.py</span> 或开启定时任务 ·
      API：<span class="mono">/api/zct-vwap/signals</span> · <span class="mono">/api/zct-vwap/summary</span>
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const apiBase = "";

    function showErr(msg) {
      const el = $("err");
      el.textContent = msg || "";
      el.classList.toggle("show", !!msg);
    }

    function fmtNum(x, d) {
      if (x === null || x === undefined) return "—";
      const n = Number(x);
      if (Number.isNaN(n)) return "—";
      return n.toLocaleString(undefined, { maximumFractionDigits: d });
    }

    function fmtPnlClass(v) {
      if (v === null || v === undefined) return "";
      const n = Number(v);
      if (Number.isNaN(n)) return "";
      return n >= 0 ? "pnl-pos" : "pnl-neg";
    }

    async function loadSummary() {
      const r = await fetch(apiBase + "/api/zct-vwap/summary");
      const j = await r.json();
      if (!j.ok) throw new Error(j.detail || "summary failed");
      $("cOpen").textContent = j.open_positions ?? "0";
      $("cSettled").textContent = j.settled_count ?? "0";
      const tp = j.total_pnl_usdt;
      const pnlEl = $("cPnl");
      pnlEl.textContent = fmtNum(tp, 2);
      pnlEl.className = "v mono " + (tp >= 0 ? "pos" : "neg");
      const wr = j.win_rate_closed;
      $("cWr").textContent = wr != null ? (wr * 100).toFixed(1) + "%" : "—";
    }

    async function loadSignals() {
      const st = $("fStatus").value;
      const sym = $("fSymbol").value.trim();
      const q = new URLSearchParams({ limit: "200", offset: "0", status: st });
      if (sym) q.set("symbol", sym);
      const r = await fetch(apiBase + "/api/zct-vwap/signals?" + q.toString());
      const j = await r.json();
      if (!j.ok) throw new Error(j.detail || "signals failed");
      const tb = $("tbody");
      tb.innerHTML = "";
      for (const row of j.items || []) {
        const tr = document.createElement("tr");
        const side = row.side || "";
        let tagClass = "flat";
        if (side === "LONG") tagClass = "long";
        if (side === "SHORT") tagClass = "short";
        const stText = row.display_status || "";
        const stCls = stText.indexOf("持仓") >= 0 ? "status-open" : "";
        tr.innerHTML =
          '<td class="mono">' + row.id + "</td>" +
          '<td class="mono">' + (row.recorded_at_utc || "").replace("T", " ").replace("Z", "") + "</td>" +
          '<td class="mono">' + (row.symbol || "") + "</td>" +
          "<td>" + (row.play || "") + "</td>" +
          '<td><span class="tag ' + tagClass + '">' + side + "</span></td>" +
          '<td class="mono">' + fmtNum(row.entry_price, 6) + "</td>" +
          '<td class="mono">' + fmtNum(row.sl_price, 4) + "</td>" +
          '<td class="mono">' + fmtNum(row.tp_price, 4) + "</td>" +
          '<td class="mono">' + fmtNum(row.virtual_notional_usdt, 0) + "</td>" +
          '<td class="' + stCls + '">' + stText + "</td>" +
          '<td class="mono">' + fmtNum(row.exit_price, 4) + "</td>" +
          '<td class="mono ' + fmtPnlClass(row.pnl_r) + '">' + fmtNum(row.pnl_r, 3) + "</td>" +
          '<td class="mono ' + fmtPnlClass(row.pnl_usdt) + '">' + fmtNum(row.pnl_usdt, 2) + "</td>" +
          '<td class="reason" title="' + (row.reasons_preview || "").replace(/"/g, "&quot;") + '">' +
          (row.reasons_preview || "") + "</td>";
        tb.appendChild(tr);
      }
      if (!(j.items || []).length) {
        const tr = document.createElement("tr");
        tr.innerHTML = '<td colspan="14" style="color:#8b949e;padding:1.5rem">暂无数据</td>';
        tb.appendChild(tr);
      }
    }

    async function refreshAll() {
      showErr("");
      try {
        await loadSummary();
        await loadSignals();
      } catch (e) {
        showErr("加载失败：" + (e.message || String(e)) + " · 请确认 API 已启动且路径正确");
      }
    }

    $("btnRefresh").addEventListener("click", refreshAll);
    $("fStatus").addEventListener("change", loadSignals);
    $("fSymbol").addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") loadSignals();
    });

    refreshAll();
    setInterval(refreshAll, 60_000);
  </script>
</body>
</html>
